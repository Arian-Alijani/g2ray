name: Run Project and Capture Full Output

on:
  workflow_dispatch:
    inputs:
      run_command:
        description: "Command to execute inside the Docker container. Leave empty to use the default CMD/ENTRYPOINT of the Dockerfile."
        required: false
        default: ""
      install_script:
        description: "Should install.sh be executed before building the Docker image? (true/false)"
        required: false
        default: "true"
      log_level:
        description: "Log level for the capture step (e.g., 'info', 'debug'). Set to 'debug' for more details."
        required: false
        default: "info"
      capture_as_artifact:
        description: "Upload captured output as an artifact? (true/false)"
        required: false
        default: "true"

jobs:
  build-and-run-container:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NODE_VERSION: 20
      PYTHON_VERSION: 3.11
      DOCKER_IMAGE_NAME: "my-project-runner"
      DOCKERFILE_PATH: ".devcontainer" # مسیر پوشه حاوی Dockerfile و install.sh

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- مرحله اول: نصب وابستگی‌های اولیه (اگر install.sh وجود دارد) ---
      - name: Prepare and Execute install.sh
        id: run_install_script
        # این step فقط زمانی اجرا می‌شود که install_script در ورودی‌ها true باشد
        # و همچنین فایل install.sh در مسیر مشخص شده وجود داشته باشد.
        if: github.event.inputs.install_script == 'true' && steps.check_install_script_exists.outputs.exists == 'true'
        run: |
          echo "--- Preparing to execute install.sh ---"
          # اطمینان از اینکه فایل قابل اجراست
          chmod +x "${{ env.DOCKERFILE_PATH }}/install.sh"

          echo "--- Executing install.sh ---"
          # استفاده از set -e برای توقف اجرای workflow در صورت خطا
          # استفاده از set -o pipefail برای مدیریت خطا در pipeline
          # استفاده از DEBIAN_FRONTEND=noninteractive برای جلوگیری از سوالات تعاملی apt/dpkg
          # هدایت خروجی به فایل و نمایش همزمان با tee
          set -e
          set -o pipefail
          export DEBIAN_FRONTEND=noninteractive

          # اجرای دستور و ذخیره خروجی در فایل لاگ
          "${{ env.DOCKERFILE_PATH }}/install.sh" 2>&1 | tee "${{ steps.run_install_script.id }}_output.log"

          echo "--- Finished install.sh ---"
          # نمایش محتوای لاگ برای اطمینان
          cat "${{ steps.run_install_script.id }}_output.log"
          # ذخیره کد خروج دستور install.sh برای بررسی‌های بعدی
          echo "install_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Check for install.sh script existence
        id: check_install_script_exists
        run: |
          if [ -f "${{ env.DOCKERFILE_PATH }}/install.sh" ]; then
            echo "install.sh found in ${{ env.DOCKERFILE_PATH }}. Proceeding."
            echo "::set-output name=exists::true"
          else
            echo "install.sh not found in ${{ env.DOCKERFILE_PATH }}. Skipping install step."
            echo "::set-output name=exists::false"
          fi

      # --- مرحله دوم: ساخت ایمیج Docker ---
      - name: Build Docker image from Dockerfile
        run: |
          echo "--- Building Docker image ---"
          # مسیر Dockerfile و context را مشخص می‌کنیم
          # اضافه کردن --no-cache برای اطمینان از ساخت تمیز ایمیج
          docker build --no-cache -t ${{ env.DOCKER_IMAGE_NAME }} -f ${{ env.DOCKERFILE_PATH }}/Dockerfile .
          echo "--- Docker image built successfully ---"

      # --- مرحله سوم: اجرای کانتینر و گرفتن خروجی ---
      - name: Execute command in Docker container and capture output
        id: run_container
        run: |
          echo "--- Running Docker container ---"
          COMMAND_TO_RUN="${{ github.event.inputs.run_command }}"
          OUTPUT_FILE="terminal_output.log"
          FULL_COMMAND=""

          if [ -z "$COMMAND_TO_RUN" ]; then
            echo "No custom command provided. Using Dockerfile's default CMD/ENTRYPOINT."
            FULL_COMMAND="docker run --rm --name project_container ${{ env.DOCKER_IMAGE_NAME }}"
          else
            echo "Executing custom command: '$COMMAND_TO_RUN'"
            # دستور سفارشی را درون sh -lc اجرا می‌کنیم تا اطمینان از کامل بودن محیط shell
            FULL_COMMAND="docker run --rm --name project_container ${{ env.DOCKER_IMAGE_NAME }} sh -lc \"\$COMMAND_TO_RUN\""
          fi

          echo "Executing: $FULL_COMMAND"
          # اجرای دستور و capture کردن خروجی (stdout و stderr)
          eval "$FULL_COMMAND" 2>&1 | tee "$OUTPUT_FILE"
          # گرفتن کد خروج دستور docker run
          CONTAINER_EXIT_CODE=${PIPESTATUS[0]}

          echo "--- Container execution finished ---"
          echo "Container exit code: $CONTAINER_EXIT_CODE"
          # ذخیره کد خروج برای استفاده در مراحل بعدی
          echo "exit_code=$CONTAINER_EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$CONTAINER_EXIT_CODE" -ne 0 ]; then
            # استفاده از ::warning برای نمایش هشدار در لاگ اکشن
            echo "::warning::Container exited with a non-zero status code ($CONTAINER_EXIT_CODE). Check logs and artifacts for details."
          fi
          echo "--- Captured Output ---"
          cat "$OUTPUT_FILE"
          echo "---------------------"
          # خروج با کد 0 تا مرحله آپلود artifact همیشه اجرا شود
          exit 0

      # --- مرحله چهارم: آپلود خروجی به عنوان Artifact ---
      - name: Upload captured output as artifact
        # این step فقط زمانی اجرا می‌شود که capture_as_artifact در ورودی‌ها true باشد
        if: github.event.inputs.capture_as_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: project-execution-output
          # اضافه کردن فایل لاگ install.sh به artifact ها
          path: |
            ${{ steps.run_install_script.id }}_output.log
            terminal_output.log
          if-no-files-found: ignore # اگر فایلی پیدا نشد، خطا ندهد
          retention-days: 7 # نگهداری artifact به مدت 7 روز

      # --- مرحله پنجم: اعلام وضعیت نهایی ---
      - name: Final Status Report
        run: |
          echo "Workflow finished."
          # بررسی کد خروج install.sh (اگر اجرا شده باشد)
          if [[ -n "${{ steps.run_install_script.outputs.install_exit_code }}" && "${{ steps.run_install_script.outputs.install_exit_code }}" != "0" ]]; then
            echo "::error::The install.sh script exited with status code ${{ steps.run_install_script.outputs.install_exit_code }}. Check the 'project-execution-output' artifact for details."
          # بررسی کد خروج کانتینر
          elif [ "${{ steps.run_container.outputs.exit_code }}" != "0" ]; then
            echo "::error::The Docker container exited with status code ${{ steps.run_container.outputs.exit_code }}. Please check the 'project-execution-output' artifact for details."
          else
            echo "::notice::Installation script and container executed successfully. Check the 'project-execution-output' artifact for logs."
          fi
