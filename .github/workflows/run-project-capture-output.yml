name: Run Project Setup and Capture Output

on:
  workflow_dispatch:
    inputs:
      run_command:
        description: "Command to execute inside the Docker container. Leave empty to use default configuration."
        required: false
        default: ""
      # ورودی جدید برای تعیین مدت زمان فعال بودن (به ثانیه)
      container_duration_seconds:
        description: "How long should the container remain active in seconds? (e.g., 300 for 5 minutes). Set to 0 to disable automatic stop."
        required: false
        default: "0" # به صورت پیش فرض بلافاصله بعد از اتمام دستورات متوقف می شود
      capture_as_artifact:
        description: "Upload captured output as an artifact? (true/false)"
        required: false
        default: "true"

jobs:
  build-and-run-container:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # زمان کلی اجرای job

    env:
      DOCKERFILE_PATH: ".devcontainer" # مسیر پوشه حاوی Dockerfile
      IMAGE_NAME: "my-project-runner"
      OUTPUT_LOG_FILE: "execution_output.log"

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # برای اطمینان از دریافت کامل تاریخچه فایل ها

      # --- مرحله 1: اطمینان از وجود Dockerfile ---
      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "${{ env.DOCKERFILE_PATH }}/Dockerfile" ]; then
            echo "Dockerfile found in ${{ env.DOCKERFILE_PATH }}. Proceeding."
            echo "::set-output name=exists::true"
          else
            echo "Dockerfile not found in ${{ env.DOCKERFILE_PATH }}. Aborting."
            echo "::set-output name=exists::false"
            exit 1 # توقف اجرا در صورت عدم وجود Dockerfile
          fi

      # --- مرحله 2: Build Docker image ---
      - name: Build Docker image
        # اجرای این step فقط در صورتی که Dockerfile پیدا شده باشد
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "--- Building Docker image from ${{ env.DOCKERFILE_PATH }}/Dockerfile ---"
          # استفاده از --no-cache برای جلوگیری از مشکلات کش
          # مسیر Dockerfile و context را مشخص می‌کنیم
          docker build --no-cache -t ${{ env.IMAGE_NAME }} -f ${{ env.DOCKERFILE_PATH }}/Dockerfile .
          echo "--- Docker image built successfully ---"

      # --- مرحله 3: Execute command in Docker container ---
      - name: Execute command and capture output
        id: run_container_step
        # اجرای این step فقط در صورتی که Dockerfile پیدا شده باشد
        if: steps.check_dockerfile.outputs.exists == 'true'
        run: |
          echo "--- Starting container execution ---"
          COMMAND_TO_RUN="${{ github.event.inputs.run_command }}"
          DURATION="${{ github.event.inputs.container_duration_seconds }}"
          FULL_RUN_COMMAND=""
          CONTAINER_NAME="project_temp_container_${{ github.run_id }}" # نام منحصر به فرد برای کانتینر

          # تعیین دستور اصلی برای اجرا
          if [ -z "$COMMAND_TO_RUN" ]; then
            # اگر دستور خاصی داده نشده، از شل پیش فرض استفاده می کنیم
            # و برای اینکه کانتینر فعال بماند، sleep یا دستور دیگری اجرا می کنیم.
            echo "No custom command provided. Running a sleep command to keep container active for ${DURATION} seconds."
            FULL_RUN_COMMAND="docker run --rm --name $CONTAINER_NAME ${{ env.IMAGE_NAME }} sleep $DURATION"
          else
            echo "Executing custom command: '$COMMAND_TO_RUN'"
            # اجرای دستور سفارشی
            # استفاده از sh -lc برای اطمینان از اجرای کامل محیط shell
            # اگر DURATION > 0 است، دستور sleep را دور دستور اصلی قرار می دهیم
            if [ "$DURATION" -gt 0 ]; then
              echo "Container will remain active for ${DURATION} seconds."
              FULL_RUN_COMMAND="docker run --rm --name $CONTAINER_NAME ${{ env.IMAGE_NAME }} sh -lc \"$COMMAND_TO_RUN && sleep $DURATION\""
            else
              FULL_RUN_COMMAND="docker run --rm --name $CONTAINER_NAME ${{ env.IMAGE_NAME }} sh -lc \"$COMMAND_TO_RUN\""
            fi
          fi

          echo "Executing: $FULL_RUN_COMMAND"
          # اجرای دستور و ذخیره خروجی در فایل لاگ
          # 2>&1 برای گرفتن همزمان stdout و stderr
          eval "$FULL_RUN_COMMAND" 2>&1 | tee "${{ env.OUTPUT_LOG_FILE }}"
          CONTAINER_EXIT_CODE=${PIPESTATUS[0]} # گرفتن کد خروج دستور docker run

          echo "--- Container execution finished ---"
          echo "Container exit code: $CONTAINER_EXIT_CODE"
          echo "exit_code=$CONTAINER_EXIT_CODE" >> $GITHUB_OUTPUT # ذخیره کد خروج

          # اگر DURATION > 0 بود و دستور اصلی با موفقیت اجرا شد، کانتینر بعد از sleep متوقف می شود.
          # اگر DURATION = 0 بود، کانتینر بلافاصله بعد از اتمام دستور اصلی متوقف می شود (به خاطر --rm).
          # برای فعال نگه داشتن کانتینر بیشتر از زمان اجرای دستور، باید --rm را حذف کرد و از docker stop استفاده کرد.
          # اما برای سادگی و جلوگیری از ماندن کانتینرها، ما از sleep در دستور اصلی استفاده می کنیم.

          if [ "$CONTAINER_EXIT_CODE" -ne 0 ]; then
            echo "::warning::Container exited with a non-zero status code ($CONTAINER_EXIT_CODE). Check output log for details."
          fi
          echo "--- Captured Output (saved to ${{ env.OUTPUT_LOG_FILE }}) ---"
          cat "${{ env.OUTPUT_LOG_FILE }}"
          echo "-----------------------------------------"
          # همیشه با کد 0 خارج شویم تا مرحله آپلود artifact اجرا شود
          exit 0

      # --- مرحله 4: آپلود خروجی به عنوان Artifact ---
      - name: Upload captured output as artifact
        # این step فقط زمانی اجرا می شود که capture_as_artifact در ورودی ها true باشد
        if: github.event.inputs.capture_as_artifact == 'true' && steps.check_dockerfile.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: execution-output-log
          path: ${{ env.OUTPUT_LOG_FILE }}
          if-no-files-found: ignore
          retention-days: 7 # نگهداری artifact به مدت 7 روز

      # --- مرحله 5: اعلام وضعیت نهایی ---
      - name: Final Status Report
        run: |
          echo "Workflow finished."
          FINAL_EXIT_CODE="${{ steps.run_container_step.outputs.exit_code }}"

          if [ "$FINAL_EXIT_CODE" == "0" ]; then
            echo "::notice::Command executed successfully. Check the 'execution-output-log' artifact for the full output."
          else
            echo "::error::Command execution failed with exit code $FINAL_EXIT_CODE. Check the 'execution-output-log' artifact for details."
          fi
