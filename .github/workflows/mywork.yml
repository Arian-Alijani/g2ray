name: Run Project via install.sh in Dev Container Environment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-project-with-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up and Run Project using install.sh
      run: |
        echo "Setting up and running project via install.sh..."
        # اطمینان حاصل کنید که فایل install.sh در مسیر صحیح قرار دارد
        # و قابل اجرا است.
        chmod +x .devcontainer/install.sh

        echo "Executing .devcontainer/install.sh..."
        # اجرای اسکریپت install.sh. فرض بر این است که این اسکریپت
        # تمام وابستگی‌ها را نصب کرده و سپس پروژه را راه‌اندازی و فعال نگه می‌دارد.
        # خروجی این دستور مستقیماً در لاگ‌های GitHub Action نمایش داده خواهد شد.
        ./.devcontainer/install.sh

        echo "install.sh script finished. If the project is running, its output should be visible above."

    # اگر install.sh پروژه را در پس‌زمینه اجرا نمی‌کند و شما نیاز دارید
    # پروسه فعال بماند، ممکن است نیاز به دستوری در انتهای install.sh
    # (اگر قابل ویرایش است) یا اضافه کردن یک دستور "نگهدارنده" در اینجا باشد.
    # اما معمولاً اسکریپت‌های اجرای پروژه خودشان پروسه را فعال نگه می‌دارند.
