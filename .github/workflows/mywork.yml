name: Build, Run Xray and Stream Logs

on:
  workflow_dispatch: # امکان اجرای دستی
  push:
    branches: [ main ] # یا هر شاخه‌ای که می‌خواهید

jobs:
  build_run_and_stream_xray:
    runs-on: ubuntu-latest

    steps:
    # 1. دریافت کد از مخزن
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. ساخت ایمیج داکر با استفاده از Dockerfile شما
    #    (این مرحله ایمیج را برای اجرا آماده می کند)
    - name: Build Docker image
      run: |
        echo "Building Docker image from Dockerfile..."
        cd .devcontainer
        # اطمینان از اینکه install.sh و config.json در Dockerfile درست کپی می شوند
        # همچنین مطمئن شوید که install.sh در Dockerfile به درستی اجرا می شود.
        docker build -t xray-service .
        cd ..
        echo "Docker image built successfully."

    # 3. اجرای کانتینر داکر در حالت Foreground و نمایش لاگ ها
    - name: Run Xray container and stream logs
      # این step تا زمانی که کانتینر در حال اجراست، ادامه پیدا می کند.
      # اگر کانتینر متوقف شود، این step نیز به پایان می رسد.
      run: |
        echo "Running Xray container in foreground mode to stream logs..."
        # اجرای کانتینر در حالت Foreground.
        # -p 443:443 پورت را فوروارد می کند.
        # --name xray-container نامی برای کانتینر.
        # xray-service نام ایمیجی که ساختیم.
        # CMD در Dockerfile باعث اجرای "xray -c /etc/config.json" می شود.
        docker run -p 443:443 --name xray-container xray-service

        echo "Xray container has stopped. Check logs above for output."
      # هر گونه خطا یا پایان یافتن اجرای کانتینر، باعث پایان این step می شود.

    # 4. (اختیاری) نمایش وضعیت نهایی کانتینر پس از اتمام step قبلی
    #    این step فقط در صورتی اجرا می شود که step قبلی با موفقیت به پایان برسد
    #    و یا اگر خطایی رخ ندهد. اگر کانتینر متوقف شود، step قبلی تمام می شود
    #    و این step اجرا می شود.
    - name: Check final container status
      if: success() || failure() # همیشه این step را اجرا کن، حتی اگر قبلی شکست خورد
      run: |
        echo "Checking final Docker container status..."
        docker ps -a --filter name=xray-container # نمایش وضعیت کانتینر (اجرا شده یا متوقف شده)

    # 5. (اختیاری) پاکسازی کانتینر پس از اتمام Job
    #    این step اطمینان حاصل می کند که کانتینر حتی اگر job با خطا تمام شود، پاک می شود.
    - name: Cleanup container
      if: always() # همیشه اجرا شود، حتی اگر job شکست خورد
      run: |
        echo "Cleaning up Xray container..."
        docker stop xray-container || true # توقف کانتینر (اگر در حال اجراست)، || true برای جلوگیری از شکست job اگر کانتینر از قبل متوقف بود
        docker rm xray-container || true   # حذف کانتینر
        echo "Container cleaned up."
