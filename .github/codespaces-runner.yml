name: Run Project in Dev Container Environment and Stream Output

on:
  push:
    branches: [ main ] # یا شاخه‌ای که می‌خواهید با push شدن به آن، این اکشن اجرا شود
  workflow_dispatch: # اجازه می‌دهد اکشن را به صورت دستی اجرا کنید

jobs:
  run-devcontainer-project:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # استفاده از آخرین نسخه

    - name: Set up Project Environment using Dev Container config
      # این مرحله سعی می‌کند محیطی مشابه Dev Container را راه‌اندازی کند.
      # برای این کار، ابتدا فایل install.sh را اجرا می‌کنیم که معمولاً پیش‌نیازها را نصب می‌کند.
      # سپس devcontainer.json را برای درک پیکربندی استفاده می‌کنیم.
      run: |
        echo "Setting up Dev Container environment..."
        # اطمینان حاصل کنید که دستور install.sh قابل اجرا است
        chmod +x .devcontainer/install.sh
        echo "Running install.sh script..."
        # اجرای اسکریپت نصب
        ./.devcontainer/install.sh
        echo "install.sh finished."

        # مرحله بعدی به طور خودکار توسط GitHub Actions مدیریت می‌شود اگر از
        # ابزارهای استاندارد Dev Container استفاده کنید، اما اینجا فرض می‌کنیم
        # نیاز به اجرای مستقیم دستورات داریم.
        # اگر Dockerfile هم دارید، ممکن است بخواهید با Docker build و run هم کار کنید،
        # اما برای سادگی، ابتدا به شبیه‌سازی محیطی که install.sh می‌سازد می‌پردازیم.

    - name: Build and Run the Project (keeping it alive)
      id: run-project
      # این بخش حیاتی است. باید دستوری را پیدا کنید که پروژه شما را راه‌اندازی کند
      # و آن را فعال نگه دارد. اگر پروژه شما یک سرور وب یا سرویس دیگری است،
      # این دستور باید آن را اجرا کند.
      run: |
        echo "Starting the project..."
        # ### بخش مهم برای تنظیم ###
        # شما باید دستور دقیق اجرای پروژه خود را اینجا قرار دهید.
        # مثال‌ها:
        # اگر پروژه Node.js است:
        # node your_main_script.js
        # اگر پروژه Python است:
        # python your_main_script.py
        # اگر پروژه یک سرور است که باید فعال بماند، از دستوراتی استفاده کنید که پروسه را زنده نگه دارند.
        # مثال: npm start (اگر package.json شما دستوری برای استارت دارد)
        # مثال: python manage.py runserver (برای Django)
        # مثال: flask run (برای Flask)

        # برای اینکه پروسه فعال بماند و خروجی را نمایش دهد، معمولاً نیازی به
        # ابزارهای اضافی مانند nohup نیست، مگر اینکه اجرای اصلی بلافاصله پایان یابد.
        # GitHub Actions لاگ‌ها را در زمان واقعی نمایش می‌دهد.

        # ### جایگزین کنید با دستور اجرای واقعی پروژه شما ###
        # مثال فرضی: فرض کنید فایل اصلی شما app.py است و با python اجرا می‌شود:
        python .devcontainer/app.py # این فقط یک مثال است، مسیر و نام فایل را با فایل اصلی خودتان جایگزین کنید

        # اگر اجرای دستور بالا بلافاصله تمام می‌شود و شما نیاز دارید
        # پروسه فعال بماند، ممکن است نیاز به دستوری مانند این داشته باشید (فقط در صورتی که واقعاً لازم باشد):
        # sleep infinity # این دستور پروسه را تا زمانی که شما آن را متوقف نکنید، فعال نگه می‌دارد.
        # یا حلقه‌ای که هر چند وقت یکبار چک کند:
        # while true; do echo "Project is running..."; sleep 300; done
        # توجه: اگر پروژه شما خودش سرویس‌دهی می‌کند، معمولاً این حلقه‌ها لازم نیستند.

        echo "Project started and should be running. Output will appear above."

    # اگر نیاز به ارتباط با Docker دارید (که معمولاً در CodeSpaces اتفاق می‌افتد):
    # - name: Set up Docker Buildx
